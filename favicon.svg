<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" shape-rendering="crispEdges">
  <rect width="100" height="100" fill="#ffffff"/>
  <!-- Uppercase E, Helvetica proportions: full-height stem + top/bottom arms, shorter middle arm -->
  <g fill="#000000">
    <rect x="30" y="18" width="11" height="64"/>   <!-- stem -->
    <rect x="30" y="18" width="40" height="11"/>   <!-- top arm -->
    <rect x="30" y="71" width="40" height="11"/>   <!-- bottom arm -->
    <rect x="30" y="45" width="32" height="10"/>   <!-- middle arm (shorter) -->
  </g>
</svg>
